<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human History Graph</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="year-grid"></canvas>
  <canvas id="lifespan-canvas" hidden></canvas>
  <div id="cy"></div>

  <svg id="era-bar"></svg>

  <aside id="info-panel" hidden>
    <button id="info-close" aria-label="Close">&times;</button>
    <h2 id="info-name"></h2>
    <p id="info-meta"></p>
    <p id="info-long-desc"></p>
    <p id="info-why-matters"></p>
    <section id="info-connections">
      <h3>Connections</h3>
      <ul id="info-connections-list"></ul>
    </section>
  </aside>

  <div id="bottom-bar">
    <button id="reset-btn">Reset view</button>
  </div>

  <div id="tooltip" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
