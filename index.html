<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human History Graph</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="year-grid"></canvas>
  <canvas id="lifespan-canvas" hidden></canvas>
  <div id="cy"></div>

  <svg id="era-bar"></svg>

  <aside id="info-panel" hidden>
    <button id="info-close" aria-label="Close">&times;</button>
    <h2 id="info-name"></h2>
    <p id="info-meta"></p>
    <p id="info-long-desc"></p>
    <p id="info-why-matters"></p>
    <section id="info-connections">
      <h3>Connections</h3>
      <ul id="info-connections-list"></ul>
    </section>
  </aside>

  <aside id="filter-panel" hidden>
    <div id="filter-header">
      <h2>Filters</h2>
      <button id="filter-close" aria-label="Close">&times;</button>
    </div>
    <label id="filter-show-all-row">
      <input type="checkbox" id="filter-show-all">
      <span class="filter-label">Show all (ignore zoom)</span>
    </label>
    <p id="filter-subtitle">Occupation groups</p>
    <button id="filter-toggle-all">Uncheck all</button>
    <ul id="filter-group-list"></ul>
  </aside>

  <div id="bottom-bar">
    <button id="reset-btn">Reset view</button>
    <button id="toggle-era-btn" aria-pressed="false">Show timeline</button>
    <button id="toggle-filter-btn" aria-pressed="false">Filters</button>
  </div>

  <div id="tooltip" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
